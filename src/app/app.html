<div class="flex flex-col h-screen overflow-hidden">
	<header
		class="shrink-0 flex items-center px-3 py-2 bg-sidebar-bg/80 border-b border-sidebar-accent/30"
	>
		<button
			(click)="toggleSidebar()"
			class="flex items-center justify-center w-8 h-8 rounded text-sidebar-text hover:bg-sidebar-accent/20 transition-colors text-lg"
			aria-label="Toggle sidebar"
		>
			&#9776;
		</button>
	</header>
	<div class="flex flex-1 overflow-hidden">
		<aside [class.hidden]="!sidebarOpen()" class="flex flex-col w-screen sm:w-64 h-full overflow-y-auto bg-sidebar-bg/80 border-r border-sidebar-accent/30 p-3 shrink-0">
			<app-side-bar [structure]="sidebarData" [openDepth]="1"></app-side-bar>
		</aside>
		<main class="flex-1 overflow-y-auto p-4">
			<router-outlet />
		</main>
	</div>
</div>
